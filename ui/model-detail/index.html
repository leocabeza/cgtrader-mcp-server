<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CGTrader — Free model detail</title>
  </head>
  <body>
    <main class="app" id="app">
      <header class="toolbar">
        <div class="summary" id="summary">Loading model…</div>
        <button type="button" class="fullscreen-btn" id="fullscreen-btn" hidden>
          Fullscreen
        </button>
      </header>

      <section id="detail-container" hidden></section>

      <div class="loader" id="loader" aria-live="polite" aria-busy="true">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loader-label">Loading model…</div>
      </div>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
